	/* Dispersion transition */
	#yaakob-blackout {
		position: fixed;
		top: 0; left: 0; width: 100%; height: 100%;
		z-index: 999998;
		pointer-events: none;
		background: #040a12;
		opacity: 0;
	}
	@keyframes particleDissolve {
		0% { opacity: 1; filter: blur(0px) brightness(1); transform: scale(1); }
		30% { filter: blur(0px) brightness(1.8); }
		100% { opacity: 0; filter: blur(12px) brightness(3); transform: scale(1.15); }
	}
	</style>

	<div id="yaakob-blackout"></div>

	<script>
	window.__yaakobBegin = function() {
		if (window.__yaakobRedirecting) return;
		window.__yaakobRedirecting = true;

		var stage = document.getElementById('Stage');
		var canvas = document.querySelector('canvas');
		var target = stage || canvas || document.body;
		var blackout = document.getElementById('yaakob-blackout');

		// Dispersion: bright flash + blur dissolve
		target.style.animation = 'particleDissolve 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards';

		// Fade to dark underneath
		setTimeout(function() {
			blackout.style.transition = 'opacity 0.8s ease';
			blackout.style.opacity = '1';
		}, 600);

		// Navigate
		setTimeout(function() {
			window.location.href = '/apps';
		}, 1800);
	};

	// Intercept preloader "Click to begin"
	(function() {
		var intercepted = false;
		var observer = new MutationObserver(function() {
			if (intercepted) return;
			var h1s = document.querySelectorAll('h1');
			for (var i = 0; i < h1s.length; i++) {
				var txt = h1s[i].textContent.toLowerCase();
				if (txt.indexOf('click to begin') !== -1 || txt.indexOf('tap to begin') !== -1) {
					intercepted = true;
					document.addEventListener('click', function(e) {
						if (window.__yaakobRedirecting) return;
						if (e.target.tagName === 'BUTTON') return;
						e.stopPropagation();
						e.stopImmediatePropagation();
						e.preventDefault();
						window.__yaakobBegin();
					}, true);
					observer.disconnect();
					return;
				}
			}
		});
		observer.observe(document.body, { childList: true, subtree: true, characterData: true });
	})();
	</script>
